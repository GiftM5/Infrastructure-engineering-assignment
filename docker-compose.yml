version: '3.8'

services:
  # Zookeeper - Required for Kafka coordination
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - infrastructure_network
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc localhost 2181 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Kafka Broker
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_NUM_NETWORK_THREADS: 8
      KAFKA_NUM_IO_THREADS: 8
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
    networks:
      - infrastructure_network
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions.sh --bootstrap-server kafka:9092 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis for session storage
  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - ./configs/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
      - redis_data:/data
    command: redis-server /usr/local/etc/redis/redis.conf
    networks:
      - infrastructure_network
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MySQL Database
  database:
    image: mysql:8.0
    container_name: database
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: cashit
      MYSQL_USER: app_user
      MYSQL_PASSWORD: app_password
    volumes:
      - ./configs/mysql/my.cnf:/etc/mysql/conf.d/my.cnf:ro
      - mysql_data:/var/lib/mysql
    networks:
      - infrastructure_network
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -prootpassword || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Nginx Load Balancer
  nginx:
    image: nginx:1.25-alpine
    container_name: nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./configs/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/ssl:ro
    depends_on:
      litespeed1:
        condition: service_healthy
      litespeed2:
        condition: service_healthy
      litespeed3:
        condition: service_healthy
    networks:
      - infrastructure_network
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # LiteSpeed Producer #1
  litespeed1:
    image: litespeedtech/openlitespeed:latest
    container_name: litespeed1
    ports:
      - "8080:8080"
      - "7080:7080"
    environment:
      TZ: UTC
    volumes:
      - ./configs/php/php.ini:/usr/local/lsws/lsphp81/etc/php/8.1/litespeed/php.ini:ro
      - ./app:/usr/local/lsws/Example/html
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - infrastructure_network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # LiteSpeed Producer #2
  litespeed2:
    image: litespeedtech/openlitespeed:latest
    container_name: litespeed2
    ports:
      - "8081:8080"
      - "7081:7080"
    environment:
      TZ: UTC
    volumes:
      - ./configs/php/php.ini:/usr/local/lsws/lsphp81/etc/php/8.1/litespeed/php.ini:ro
      - ./app:/usr/local/lsws/Example/html
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - infrastructure_network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # LiteSpeed Consumer/Producer #3
  litespeed3:
    image: litespeedtech/openlitespeed:latest
    container_name: litespeed3
    ports:
      - "8082:8080"
      - "7082:7080"
    environment:
      TZ: UTC
    volumes:
      - ./configs/php/php.ini:/usr/local/lsws/lsphp81/etc/php/8.1/litespeed/php.ini:ro
      - ./app:/usr/local/lsws/Example/html
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - infrastructure_network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Kafka Consumer #1
  consumer1:
    image: litespeedtech/openlitespeed:latest
    container_name: consumer1
    ports:
      - "8083:8080"
      - "7083:7080"
    environment:
      TZ: UTC
      CONSUMER_MODE: "true"
      CONSUMER_GROUP: db_writers
    volumes:
      - ./configs/php/php.ini:/usr/local/lsws/lsphp81/etc/php/8.1/litespeed/php.ini:ro
      - ./app:/usr/local/lsws/Example/html
    depends_on:
      kafka:
        condition: service_healthy
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - infrastructure_network

  # Kafka Consumer #2
  consumer2:
    image: litespeedtech/openlitespeed:latest
    container_name: consumer2
    ports:
      - "8084:8080"
      - "7084:7080"
    environment:
      TZ: UTC
      CONSUMER_MODE: "true"
      CONSUMER_GROUP: db_writers
    volumes:
      - ./configs/php/php.ini:/usr/local/lsws/lsphp81/etc/php/8.1/litespeed/php.ini:ro
      - ./app:/usr/local/lsws/Example/html
    depends_on:
      kafka:
        condition: service_healthy
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - infrastructure_network

  # Phpmyadmin (optional)
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: phpmyadmin
    ports:
      - "8888:80"
    environment:
      PMA_HOST: database
      PMA_USER: root
      PMA_PASSWORD: rootpassword
    depends_on:
      database:
        condition: service_healthy
    networks:
      - infrastructure_network

networks:
  infrastructure_network:
    driver: bridge

volumes:
  redis_data:
  mysql_data:
