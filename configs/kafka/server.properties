# Kafka Broker Configuration
# This configuration file is used to configure the Kafka broker for message handling

# The broker id for this server. It is used to uniquely identify the broker
broker.id=1

# Advertised listeners for external communication
advertised.listeners=PLAINTEXT://kafka:9092

# List of URIs we will listen on and the listener names they are associated with
listeners=PLAINTEXT://0.0.0.0:9092

# Relationship between listener names, security protocols, and host names
listener.security.protocol.map=PLAINTEXT:PLAINTEXT

# The inter.broker.listener.name parameter tells the brokers which listener to use for communicating with other brokers
inter.broker.listener.name=PLAINTEXT

# Zookeeper connection string
zookeeper.connect=zookeeper:2181

# Number of network threads that the server uses for handling network requests
num.network.threads=8

# Number of threads that the server uses for handling I/O operations
num.io.threads=8

# Socket send buffer size
socket.send.buffer.bytes=102400

# Socket receive buffer size
socket.receive.buffer.bytes=102400

# Maximum size of a request that the socket server will accept
socket.request.max.bytes=104857600

# Number of log partitions for the default topic
num.partitions=3

# Default replication factor for new topics
default.replication.factor=1

# Retention policy - keep messages for 7 days
log.retention.hours=168

# Segment size - rotate log every 1GB
log.segment.bytes=1073741824

# Enable log cleanup policy
log.cleanup.policy=delete

# Number of I/O threads per data directory for log recovery at startup and flushing at shutdown
num.recovery.threads.per.data.dir=1

# Offsets topic configuration
offsets.topic.replication.factor=1

# Auto create topics
auto.create.topics.enable=true

# Min in-sync replicas for producer ack=all
min.insync.replicas=1

# Enable metrics
metrics.num.samples=3
metrics.sample.window.ms=30000

# Broker log directory
log.dirs=/var/lib/kafka-logs

# Group initial rebalance delay
group.initial.rebalance.delay.ms=3000
