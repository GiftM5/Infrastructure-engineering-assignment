# Redis Configuration File
# This configuration file is used to configure the Redis server

# Network interface to bind to
bind 0.0.0.0

# Port to listen on
port 6379

# Accept connections only from this IP (optional, comment out for all interfaces)
# bind 127.0.0.1

# TCP listen() backlog
tcp.backlog 511

# TCP keepalive time
tcp.keepalive 300

# Daemonize the Redis server
daemonize no

# Specify the server verbosity level
loglevel notice

# Database count
databases 16

# Snapshots (RDB) - persist the dataset to disk
# save <seconds> <changes>
save 900 1
save 300 10
save 60 10000

# Disable saving if needed (for performance testing)
# save ""

# Compress string objects using LZF when dump .rdb databases
rdbcompression yes

# Checksum the RDB file
rdbchecksum yes

# RDB file name
dbfilename dump.rdb

# Directory to save RDB files
dir /var/lib/redis

# Enable AOF (Append Only File) persistence
appendonly yes

# AOF file name
appendfilename "appendonly.aof"

# AOF fsync policy
appendfsync everysec

# Memory management
maxmemory 256mb

# Memory eviction policy
maxmemory-policy allkeys-lru

# Replication backlog size (for replication)
repl-backlog-size 1mb

# Replication backlog ttl (in seconds)
repl-backlog-ttl 3600

# Timeout for client connections
timeout 0

# TCP keepalive
tcp-keepalive 300

# Disable dangerous commands
rename-command FLUSHDB ""
rename-command FLUSHALL ""

# Set database password (optional)
# requirepass yourpassword

# Min slaves to write
min-slaves-to-write 0
min-slaves-max-lag 10
